<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page Not Found — Your Choice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0A0A08;color:#F5EDD8;font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;}
.wrap{max-width:400px;}
.logo{font-size:48px;margin-bottom:16px;}
h1{font-size:80px;font-weight:700;background:linear-gradient(135deg,#C9922A,#E8B84B);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
p{color:#8A7E6A;margin:16px 0 28px;font-size:15px;line-height:1.6;}
a{display:inline-block;padding:13px 28px;border-radius:100px;
  background:linear-gradient(135deg,#C9922A,#E8B84B);color:#0A0A08;
  font-weight:700;font-size:14px;text-decoration:none;
  transition:transform .3s,box-shadow .3s;}
a:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(201,146,42,.4);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">👑</div>
  <h1>404</h1>
  <p>This page doesn't exist in our collection.<br>Let's take you back to the store.</p>
  <a href="index.html">← Back to Store</a>
</div>
</body>
</html>
